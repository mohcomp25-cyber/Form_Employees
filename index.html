<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Employee Form</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Segoe UI',Tahoma,Arial,sans-serif;background:#F7F3EE;color:#2C1A0E;min-height:100vh;padding:2rem 1rem}
  .wrap{max-width:680px;margin:0 auto}
  .lang-bar{display:flex;justify-content:center;gap:8px;margin-bottom:1.5rem}
  .lang-btn{padding:7px 22px;border:1.5px solid #DDD0C0;border-radius:20px;background:#FFF8F0;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;color:#A0856A}
  .lang-btn.active{background:#FF6B00;border-color:#FF6B00;color:#fff}
  .lang-btn:hover:not(.active){border-color:#FF6B00;color:#FF6B00}
  .header-card{background:linear-gradient(135deg,#FF6B00 0%,#E85500 100%);border-radius:16px;padding:1.8rem 1.5rem;margin-bottom:1.5rem;display:flex;align-items:center;gap:16px}
  .header-icon{width:60px;height:60px;background:rgba(255,255,255,0.18);border-radius:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .header-title{font-size:20px;font-weight:700;color:#fff;margin-bottom:3px}
  .header-sub{font-size:12px;color:rgba(255,255,255,0.75)}
  .section{background:#fff;border:1px solid #EDE4D8;border-radius:14px;padding:1.5rem;margin-bottom:1rem;box-shadow:0 1px 4px rgba(180,120,60,0.06)}
  .section-title{font-size:12px;font-weight:700;color:#B07040;margin-bottom:1rem;letter-spacing:.8px;text-transform:uppercase}
  .row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .row.full{grid-template-columns:1fr}
  .field{display:flex;flex-direction:column;gap:5px}
  label{font-size:13px;color:#6B4C30;font-weight:600}
  label span.req{color:#E24B4A;margin-right:2px;margin-left:2px}
  input[type=text],input[type=tel],input[type=email],input[type=date],select,textarea{width:100%;padding:9px 12px;font-size:14px;border:1px solid #DDD0C0;border-radius:9px;background:#FFFAF5;color:#2C1A0E;font-family:inherit;transition:border-color .2s}
  input:focus,select:focus,textarea:focus{outline:none;border-color:#FF6B00;box-shadow:0 0 0 3px rgba(255,107,0,0.1);background:#fff}
  .iban-wrap{display:flex}
  .iban-prefix{padding:9px 14px;background:#FF6B00;color:#fff;font-size:14px;font-weight:700;white-space:nowrap;letter-spacing:1px;border-radius:9px 0 0 9px}
  .iban-wrap input{border-radius:0 9px 9px 0;border-left:none}
  .hint{font-size:11px;color:#B09070;margin-top:3px}
  .upload-zone{border:1.5px dashed #DDD0C0;border-radius:9px;padding:1.2rem;text-align:center;cursor:pointer;background:#FFFAF5;transition:border-color .2s}
  .upload-zone:hover{border-color:#FF6B00;background:#FFF5EE}
  .upload-zone input{display:none}
  .upload-icon{font-size:28px;opacity:.45;margin-bottom:6px}
  .upload-label{font-size:13px;color:#A08060}
  .upload-name{font-size:12px;color:#FF6B00;margin-top:4px;display:none;font-weight:500}
  .preview-img{width:100%;max-height:150px;object-fit:cover;border-radius:8px;margin-top:10px;display:none;border:1px solid #EDE4D8}
  .submit-btn{width:100%;padding:14px;background:#FF6B00;color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:.5rem;transition:opacity .2s;letter-spacing:.3px}
  .submit-btn:hover{opacity:.9}
  
  /* Success animation */
  @keyframes fadeInScale {
    0% {opacity:0; transform:scale(0.8);}
    100% {opacity:1; transform:scale(1);}
  }
  .success{display:none;text-align:center;padding:3rem 1rem}
  .success.show {
    display: block;
    animation: fadeInScale 0.5s ease forwards;
  }
  .success-icon{width:64px;height:64px;background:#EAF3DE;border-radius:50%;margin:0 auto 1rem;display:flex;align-items:center;justify-content:center;font-size:28px}
  .success-title{font-size:20px;font-weight:700;margin-bottom:8px;color:#2C5F10}
  .success-sub{font-size:14px;color:#888}
  
  @media(max-width:520px){.row{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="wrap">

  <div class="lang-bar">
    <button class="lang-btn active" onclick="setLang('ar',this)">العربية</button>
    <button class="lang-btn" onclick="setLang('en',this)">English</button>
    <button class="lang-btn" onclick="setLang('ur',this)">اردو</button>
  </div>

  <div class="header-card">
    <div class="header-icon">
      <svg width="36" height="36" viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="18" cy="11" r="6" fill="white" opacity="0.95"/>
        <path d="M6 30 C6 22 10 19 18 19 C26 19 30 22 30 30" fill="white" opacity="0.95"/>
        <rect x="13" y="24" width="10" height="7" rx="2" fill="#FF6B00" opacity="0.85"/>
        <rect x="15" y="26" width="6" height="1.2" rx="0.6" fill="white"/>
        <rect x="15" y="28.2" width="4" height="1" rx="0.5" fill="white" opacity="0.7"/>
        <rect x="17.2" y="21" width="1.6" height="3.2" rx="0.8" fill="white" opacity="0.6"/>
      </svg>
    </div>
    <div>
      <div class="header-title" id="t-main-title">استمارة بيانات الموظف</div>
      <div class="header-sub" id="t-subtitle">استمارة موظفين</div>
    </div>
  </div>

  <div id="form-content">
    <!-- هنا تضع جميع الأقسام كما في الكود الأصلي -->
    <!-- لنختصر الكود هنا، الافتراض أنه تم نسخ باقي الحقول كما في النسخة الأصلية -->
  </div>

  <button type="button" class="submit-btn" id="t-submit" onclick="submitForm()">إرسال البيانات</button>

  <div class="success" id="success-msg">
    <div class="success-icon">✅</div>
    <div class="success-title" id="t-success-title">تم الإضافة بنجاح!</div>
    <div class="success-sub" id="t-success-sub">شكراً، سيتم مراجعة معلوماتك من قبل الفريق قريباً.</div>
  </div>

</div>

<script>
var WEBHOOK_URL="https://dwadawdawd.app.n8n.cloud/webhook/Form_Employees";
var currentPayType='bank';
var currentLang='ar';
var T = {/* نفس الترجمة كما في النسخة الأصلية */};

// تابع setPayType, setLang, setLabel, formatIBAN, previewFile, toBase64Compressed
// تبقى كما هي من الكود الأصلي

function submitForm(){
  var t=T[currentLang];
  var baseFields=[{id:'fullname',l:t.v_fullname},{id:'iqamanum',l:t.v_iqamanum},{id:'phone',l:t.v_phone},{id:'email',l:t.v_email},{id:'dob',l:t.v_dob},{id:'workplace',l:t.v_workplace},{id:'jobtitle',l:t.v_jobtitle},{id:'homeaddress',l:t.v_homeaddress},{id:'emergency',l:t.v_emergency}];
  var bankOnlyFields=currentPayType==='bank'?[{id:'iban',l:t.v_iban},{id:'bank',l:t.v_bank},{id:'accnum',l:t.v_accnum}]:[];
  var fields=baseFields.concat(bankOnlyFields);
  for(var i=0;i<fields.length;i++){var el=document.getElementById(fields[i].id);if(!el.value.trim()){el.focus();el.style.borderColor='#E24B4A';el.style.boxShadow='0 0 0 3px rgba(226,75,74,0.15)';(function(e){setTimeout(function(){e.style.borderColor='';e.style.boxShadow='';},2500);})(el);alert(t.err_pre+fields[i].l);return;}}
  var files=[{id:'f-iqama',l:t.v_iqama},{id:'f-photo',l:t.v_photo}];
  for(var j=0;j<files.length;j++){if(!document.getElementById(files[j].id).files.length){alert(t.err_file+files[j].l);return;}}
  var btn=document.getElementById('t-submit');btn.textContent=t.sending;btn.disabled=true;
  var healthFile=document.getElementById('f-health').files[0];
  var promises=[toBase64Compressed(document.getElementById('f-iqama').files[0]),healthFile?toBase64Compressed(healthFile):Promise.resolve(null),toBase64Compressed(document.getElementById('f-photo').files[0])];
  Promise.all(promises).then(function(imgs){
    var ibanRaw=currentPayType==='bank'?document.getElementById('iban').value.replace(/\s/g,''):'';
    var payload={
      fullname:document.getElementById('fullname').value.trim(),
      phone:document.getElementById('phone').value.trim(),
      email:document.getElementById('email').value.trim(),
      dob:document.getElementById('dob').value,
      workplace:document.getElementById('workplace').value.trim(),
      job_title:document.getElementById('jobtitle').value.trim(),
      iqama_number:document.getElementById('iqamanum').value.trim(),
      payment_type:currentPayType,
      iban:currentPayType==='bank'?'SA'+ibanRaw:'كاش',
      bank_name:currentPayType==='bank'?document.getElementById('bank').value:'كاش',
      account_number:currentPayType==='bank'?document.getElementById('accnum').value.trim():'كاش',
      home_address:document.getElementById('homeaddress').value.trim(),
      emergency_number:document.getElementById('emergency').value.trim(),
      iqama_image_base64:imgs[0],
      health_card_base64:imgs[1],
      personal_photo_base64:imgs[2],
      form_language:currentLang,
      submitted_at:new Date().toISOString()
    };
    return fetch(WEBHOOK_URL,{method:'POST',mode:'cors',headers:{'Content-Type':'text/plain'},body:JSON.stringify(payload)});
  }).then(function(res){
    if(!res.ok)throw new Error('err');
    document.getElementById('form-content').style.display='none';
    var successMsg=document.getElementById('success-msg');
    successMsg.classList.add('show');
  }).catch(function(){
    btn.textContent=t.submit;btn.disabled=false;
    alert(t.err_conn);
  });
}
</script>
</body>
</html>
